spring:
  application:
    name: card-transaction-system
  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.OpenTracingAutoConfiguration
  cloud:
    function:
      definition: tokenExchange;loginFunction;processTransactionFunction;validateTransactionFunction;validateBusinessRulesFunction;compensationFunction;fraudAnalysisFunction;updateStatusFunction;getStatusFunction
  profiles:
    group:
      local-rich: cache-redis,queue-kafka,saga-temporal,ledger-postgres,fraud-ollama,env-local
      aws:        cache-dynamodb,queue-none,saga-stepfunctions,ledger-dynamodb,fraud-bedrock,env-aws

aws:
  region: ${AWS_REGION:us-east-1}

auth:
  lambda:
    function-name: ${AUTH_LAMBDA_FUNCTION_NAME:token-exchange-lambda}
  hardcoded-opaque-token: ${AUTH_OPAQUE_TOKEN:local-dev-opaque-token}

jwt:
  secret: ${JWT_SECRET:default-secret-key-change-in-prod!!}
  expiration-hours: 24

step-functions:
  state-machine-arn: ${STEP_FUNCTIONS_STATE_MACHINE_ARN:arn:aws:states:us-east-1:000000000000:stateMachine:card-transaction-system-transaction-saga}


bedrock:
  fraud-agent:
    model-id: ${BEDROCK_MODEL_ID:us.anthropic.claude-haiku-4-5-20251001-v1:0}

fraud:
  agent:
    threshold: ${FRAUD_THRESHOLD:80}

logging:
  level:
    root: INFO
    com.empresa.cardtransactionsystem: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        step: 10s