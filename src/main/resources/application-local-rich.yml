spring:
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: card-transaction-system
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

aws:
  dynamodb:
    endpoint: http://localhost:4566
    region: us-east-1

step-functions:
  state-machine-arn: arn:aws:states:us-east-1:000000000000:stateMa

temporal:
  host: localhost
  port: 7233

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/card_transactions
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
