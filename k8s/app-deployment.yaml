apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-transaction-app
  namespace: card-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card-transaction-app
  template:
    metadata:
      labels:
        app: card-transaction-app
    spec:
      containers:
      - name: app
        image: card-transaction-system:latest # Assumindo build local e load no Kind
        imagePullPolicy: Never
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: card-transaction-service
  namespace: card-system
spec:
  selector:
    app: card-transaction-app
  ports:
  - port: 80
    targetPort: 8080